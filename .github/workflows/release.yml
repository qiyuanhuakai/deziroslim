name: Draft Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: deziroslim
  DISPLAY_NAME: deziroslim
  ICON_NAME: deziroslim
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  draft-release:
    name: Build and create draft release (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        include:
          - runner: ubuntu-latest
            arch: x86_64
            deb_arch: amd64
            rpm_arch: x86_64
            linuxdeploy_asset: linuxdeploy-x86_64.AppImage
          - runner: ubuntu-24.04-arm
            arch: aarch64
            deb_arch: arm64
            rpm_arch: aarch64
            linuxdeploy_asset: linuxdeploy-aarch64.AppImage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libx11-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            mold \
            file \
            rpm \
            ruby \
            ruby-dev \
            wget

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify Cargo.toml version matches tag
        run: |
          version="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "${version}" != "${tag_version}" ]; then
            echo "::error::Cargo.toml version (${version}) does not match tag ${GITHUB_REF_NAME} (${tag_version})"
            exit 1
          fi
          echo "Cargo.toml version ${version} matches tag ${GITHUB_REF_NAME}"

      - name: Verify icon exists
        run: |
          icon="assets/icons/${ICON_NAME}.png"
          if [ ! -f "${icon}" ]; then
            echo "::error::Required icon file not found: ${icon}"
            exit 1
          fi
          echo "Found icon: ${icon}"

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Cache fpm installation
        id: cache-fpm
        uses: actions/cache@v4
        with:
          path: |
            /var/lib/gems
            /usr/local/bin/fpm
          key: fpm-${{ runner.os }}-${{ matrix.arch }}

      - name: Install fpm
        if: steps.cache-fpm.outputs.cache-hit != 'true'
        run: sudo gem install --no-document fpm

      - name: Verify fpm available
        run: |
          if ! command -v fpm >/dev/null 2>&1; then
            echo "::warning::fpm not on PATH after cache + install, falling back to fresh install"
            sudo gem install --no-document fpm
          fi
          fpm --version

      - name: Install linuxdeploy
        env:
          LINUXDEPLOY_VERSION: 1-alpha-20251107-1
          LINUXDEPLOY_ASSET: ${{ matrix.linuxdeploy_asset }}
        run: |
          linuxdeploy_url="https://github.com/linuxdeploy/linuxdeploy/releases/download/${LINUXDEPLOY_VERSION}/${LINUXDEPLOY_ASSET}"
          wget -qO linuxdeploy --retry-connrefused --tries=5 --timeout=30 "${linuxdeploy_url}"
          chmod +x linuxdeploy

      - name: Prepare Linux package metadata
        run: |
          mkdir -p packaging dist
          cat > "packaging/${APP_NAME}.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=${DISPLAY_NAME}
          Comment=Lightweight native deziroslim clipboard manager
          Exec=${APP_NAME}
          Icon=${ICON_NAME}
          Terminal=false
          Categories=Utility;
          EOF
          install -Dm755 "target/release/${APP_NAME}" "packaging/root/usr/bin/${APP_NAME}"
          install -Dm644 "packaging/${APP_NAME}.desktop" "packaging/root/usr/share/applications/${APP_NAME}.desktop"
          install -Dm644 "assets/icons/${ICON_NAME}.png" "packaging/root/usr/share/icons/hicolor/256x256/apps/${ICON_NAME}.png"

      - name: Build deb and rpm packages
        env:
          DEB_ARCH: ${{ matrix.deb_arch }}
          RPM_ARCH: ${{ matrix.rpm_arch }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          fpm -s dir -t deb \
            -n "${APP_NAME}" \
            -v "${version}" \
            --architecture "${DEB_ARCH}" \
            --license GPL-3.0 \
            --description "Lightweight native deziroslim clipboard manager" \
            --depends xdotool \
            --maintainer "qiyuanhuakai" \
            --url "https://github.com/qiyuanhuakai/deziroslim" \
            -C packaging/root \
            -p "dist/${APP_NAME}_${version}_${DEB_ARCH}.deb" \
            usr
          fpm -s dir -t rpm \
            -n "${APP_NAME}" \
            -v "${version}" \
            --architecture "${RPM_ARCH}" \
            --license GPL-3.0 \
            --description "Lightweight native deziroslim clipboard manager" \
            --depends xdotool \
            --maintainer "qiyuanhuakai" \
            --url "https://github.com/qiyuanhuakai/deziroslim" \
            -C packaging/root \
            -p "dist/${APP_NAME}-${version}-1.${RPM_ARCH}.rpm" \
            usr

      - name: Build AppImage package
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          ARCH: ${{ matrix.arch }}
          NO_STRIP: 1
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp "target/release/${APP_NAME}" "AppDir/usr/bin/${APP_NAME}"
          cp "packaging/${APP_NAME}.desktop" "AppDir/usr/share/applications/${APP_NAME}.desktop"
          cp "assets/icons/${ICON_NAME}.png" "AppDir/usr/share/icons/hicolor/256x256/apps/${ICON_NAME}.png"
          ./linuxdeploy \
            --appdir AppDir \
            --desktop-file "AppDir/usr/share/applications/${APP_NAME}.desktop" \
            --icon-file "AppDir/usr/share/icons/hicolor/256x256/apps/${ICON_NAME}.png" \
            --output appimage
          appimage_path="$(find . -maxdepth 1 -type f -name '*.AppImage' -print -quit)"
          test -n "${appimage_path}"
          mv "${appimage_path}" "dist/${APP_NAME}-${version}-${ARCH}.AppImage"

      - name: Smoke test packages
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          set -e
          echo "--- Verifying .deb metadata ---"
          dpkg-deb -I dist/*.deb
          echo "--- Verifying .rpm metadata ---"
          rpm -qpi dist/*.rpm
          echo "--- Verifying .AppImage ELF ---"
          file dist/*.AppImage
          echo "--- Artifact list ---"
          ls -lh dist/

      - name: Generate per-arch checksums
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          cd dist
          sha256sum ./* > "${APP_NAME}-${GITHUB_REF_NAME}-${ARCH}-checksums.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
            dist/*-checksums.sha256

  windows-release:
    name: Build Windows release (${{ matrix.arch }})
    runs-on: windows-latest
    needs: draft-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: amd64
            pe_machine: "8664"
            msvc_arch: amd64
          - target: aarch64-pc-windows-msvc
            arch: arm64
            pe_machine: "AA64"
            msvc_arch: amd64_arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-${{ matrix.target }}

      - name: Verify Cargo.toml version matches tag
        shell: pwsh
        run: |
          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $version = ($metadata.packages | Where-Object name -eq $env:APP_NAME).version
          $tagVersion = $env:GITHUB_REF_NAME -replace '^v', ''
          if ($version -ne $tagVersion) {
            throw "Cargo.toml version ($version) does not match tag $env:GITHUB_REF_NAME ($tagVersion)"
          }
          Write-Output "Cargo.toml version $version matches tag $env:GITHUB_REF_NAME"

      - name: Verify Windows icon exists
        shell: pwsh
        run: |
          $icon = "assets/icons/$env:ICON_NAME.ico"
          if (-not (Test-Path -LiteralPath $icon)) {
            throw "Required icon file not found: $icon"
          }
          Write-Output "Found icon: $icon"

      - name: Run Windows tests
        if: matrix.arch == 'amd64'
        run: cargo test --locked --target ${{ matrix.target }}

      - name: Build Windows release binaries
        run: cargo build --release --locked --target ${{ matrix.target }} --bins

      - name: Verify PE architecture
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          EXPECTED_MACHINE: ${{ matrix.pe_machine }}
        run: |
          foreach ($binary in @($env:APP_NAME, 'dzc-slim')) {
            $path = "target/$env:TARGET/release/$binary.exe"
            $bytes = [System.IO.File]::ReadAllBytes($path)
            $peOffset = [BitConverter]::ToInt32($bytes, 0x3c)
            $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4).ToString('X4')
            if ($machine -ne $env:EXPECTED_MACHINE) {
              throw "$path has PE machine $machine, expected $env:EXPECTED_MACHINE"
            }
            Write-Output "${path}: PE machine $machine"
          }

      - name: Package Windows release
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          ARCH: ${{ matrix.arch }}
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $packageName = "$env:APP_NAME-$version-windows-$env:ARCH"
          $packageDir = "packaging/$packageName"
          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/$env:TARGET/release/$env:APP_NAME.exe" $packageDir
          Copy-Item "target/$env:TARGET/release/dzc-slim.exe" $packageDir
          Copy-Item README.md, LICENSE $packageDir
          $archive = "dist/$packageName.zip"
          Compress-Archive -Path "$packageDir/*" -DestinationPath $archive -CompressionLevel Optimal
          $archiveItem = Get-Item -LiteralPath $archive
          $hash = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($archiveItem.Name)" | Set-Content "dist/$packageName-checksums.sha256"

      - name: Smoke test Windows archive
        shell: pwsh
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $packageName = "$env:APP_NAME-$version-windows-$env:ARCH"
          $extractDir = Join-Path $env:RUNNER_TEMP $packageName
          Expand-Archive -LiteralPath "dist/$packageName.zip" -DestinationPath $extractDir
          foreach ($file in @("$env:APP_NAME.exe", 'dzc-slim.exe', 'README.md', 'LICENSE')) {
            if (-not (Test-Path -LiteralPath (Join-Path $extractDir $file))) {
              throw "Archive is missing $file"
            }
          }
          Get-ChildItem -LiteralPath dist

      - name: Upload Windows release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            dist/*.zip
            dist/*-checksums.sha256
